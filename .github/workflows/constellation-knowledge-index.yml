name: "QGIA Knowledge Index Publisher"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.aurora/constellation.json'
      - '.aurora/closed-loop-bootstrap.json'
      - 'data/**'
      - 'scripts/*.py'
      - 'tests/**'
      - '!references/**'
      - '!policies/**'

permissions:
  contents: write

jobs:
  generate-index:
    name: Generate & Publish Knowledge Index
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate knowledge index
        run: python3 scripts/generate-knowledge-index.py

      - name: Validate knowledge contract
        run: python3 scripts/validate-knowledge-contract.py

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Commit updated index
        run: |
          git config user.name "aurora-constellation[bot]"
          git config user.email "aurora-constellation[bot]@users.noreply.github.com"
          git add .aurora/knowledge-index.json
          git diff --cached --quiet || git commit -m "chore: auto-update knowledge index [skip ci]"
          git push

      - name: Publish event to Constellation Hub
        if: success() && env.HAS_TOKEN == 'true'
        env:
          HAS_TOKEN: ${{ secrets.CONSTELLATION_TOKEN != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CONSTELLATION_TOKEN }}
          repository: AUo959/aurora-cloudbank-symbolic
          event-type: qgia.knowledge.updated
          client-payload: >-
            {
              "source_node": "QGIA-CORPUS",
              "source_repo": "qgia-knowledge-library",
              "event_type": "qgia.knowledge.updated",
              "correlation_id": "${{ github.run_id }}-${{ github.run_number }}",
              "timestamp": "${{ github.event.head_commit.timestamp }}",
              "payload": {
                "commit_sha": "${{ github.sha }}",
                "index_url": "https://raw.githubusercontent.com/AUo959/qgia-knowledge-library/main/.aurora/knowledge-index.json"
              }
            }
